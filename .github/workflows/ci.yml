name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q

  notebook:
    name: Notebook (reproducibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Execute the case-study notebook on a copy (reproducibility check)
        # Runs from the case-study dir so the notebook's data/ paths resolve; writes to a
        # throwaway output file so the committed notebook is unchanged. Does not fail on output diffs.
        run: |
          cd case-studies/granite-3.3-8b-l4
          uv run --with "jupyter,nbconvert,ipykernel,pandas,matplotlib,nbformat" \
            jupyter nbconvert --to notebook --execute \
            --output /tmp/analysis-ci-output.ipynb analysis.ipynb

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"
      - name: Format check
        run: terraform -chdir=terraform fmt -recursive -check -diff
      - name: Init (no backend)
        run: terraform -chdir=terraform init -backend=false -input=false
      - name: Validate
        run: terraform -chdir=terraform validate

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks (CLI)
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repo and history
        run: gitleaks git . --redact --exit-code 1
